<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Days With You</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --jp-font: 'Noto Serif JP', serif;
            --primary-gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--jp-font);
        }

        /* --- 1. 密碼頁面 (最上層) --- */
        #password-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }

        .password-container {
            text-align: center;
            color: #fff;
        }

        .password-container h1 {
            font-weight: 300;
            letter-spacing: 0.15rem;
            margin-bottom: 40px;
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .digit-input {
            width: 45px;
            height: 60px;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.3);
            color: var(--primary-gold);
            font-size: 32px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
        }

        .digit-input:focus {
            border-bottom-color: var(--primary-gold);
            transform: translateY(-3px);
        }

        /* --- 2. 主內容層級 --- */
        #main-content {
            position: fixed;
            inset: 0;
            display: none;
            z-index: 10;
        }

        /* 底層：星空背景 */
        .sky-background {
            position: absolute;
            inset: 0;
            background: url('phil-botha-a0TJ3hy-UD8-unsplash.jpg') center/cover no-repeat;
            z-index: 1;
        }

        /* 中層：煙花畫布 */
        canvas#fireworks {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* 頂層：合照與文字 */
        #photo-reveal {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100; /* 確保最高 */
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 3s ease, transform 3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        #photo-reveal.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .photo-frame {
            width: 85vw;
            max-width: 500px;
            box-shadow: 0 20px 70px rgba(0, 0, 0, 0.8);
            border: 10px solid #fff;
            border-radius: 4px;
            overflow: hidden;
            background: #111;
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .anniversary-text {
            margin-top: 30px;
            color: #fff;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.1rem;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            text-align: center;
        }

        @media (max-width: 600px) {
            .anniversary-text { font-size: 1.5rem; }
            .password-container h1 { font-size: 1.2rem; }
            .photo-frame { width: 90vw; }
        }
    </style>
</head>
<body>

    <div id="password-overlay">
        <div class="password-container">
            <h1>Enter our secret number</h1>
            <div class="input-group">
                <input type="password" maxlength="1" class="digit-input" autofocus autocomplete="off">
                <input type="password" maxlength="1" class="digit-input" autocomplete="off">
                <input type="password" maxlength="1" class="digit-input" autocomplete="off">
                <input type="password" maxlength="1" class="digit-input" autocomplete="off">
            </div>
        </div>
    </div>

    <div id="main-content">
        <div class="sky-background"></div>
        <canvas id="fireworks"></canvas>
        
        <div id="photo-reveal">
            <div class="photo-frame">
                <img src="未命名設計.jpg" alt="100 Days Celebration">
            </div>
            <div class="anniversary-text">100 days with you</div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.digit-input');
        const correctPassword = '1225'; // 您的紀念日密碼

        // 密碼輸入邏輯
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkPassword();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checkPassword() {
            const pw = Array.from(inputs).map(i => i.value).join('');
            if (pw === correctPassword) {
                unlockSite();
            } else if (pw.length === 4) {
                setTimeout(() => {
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                }, 500);
            }
        }

        function unlockSite() {
            const overlay = document.getElementById('password-overlay');
            const content = document.getElementById('main-content');
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                content.style.display = 'block';
                
                // 啟動煙花
                initFireworks();

                // 5 秒後顯示合照 (與煙花綻放配合)
                setTimeout(() => {
                    document.getElementById('photo-reveal').classList.add('active');
                }, 5000);
            }, 1500);
        }

        // --- 煙花特效系統 ---
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);

        function initFireworks() {
            resize();
            animate();
            
            // 背景常規煙花 (維持高頻率)
            setInterval(() => {
                createExplosion(false);
                if(Math.random() > 0.5) createExplosion(false);
            }, 400);

            // 中央較大型煙花 (每 6 秒一次)
            setInterval(() => {
                createExplosion(true);
            }, 6000);
        }

        class Particle {
            constructor(x, y, color, speed, angle, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.friction = 0.96;
                this.gravity = 0.06;
                this.size = size;
                this.decay = 0.0045; // 粒子慢慢淡出
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
        }

        function createExplosion(isBig) {
            const x = isBig ? canvas.width / 2 : Math.random() * canvas.width;
            const y = isBig ? canvas.height * 0.45 : Math.random() * (canvas.height * 0.65);
            const hue = Math.random() * 360;
            const color = `hsl(${hue}, 100%, 75%)`;
            
            const count = isBig ? 250 : 100; 
            const baseSize = isBig ? 4.5 : 2.5;

            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * (isBig ? 18 : 10) + 1;
                particles.push(new Particle(x, y, color, speed, angle, baseSize));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
    </script>
</body>
</html>
